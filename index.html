<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#121212">
  <title>Pocket AI Assistant</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    body { margin: 0; font-family: 'Inter', sans-serif; background: #121212; color: #fff; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    
    /* Core Chat Container */
    #chat-container { width: 90%; max-width: 500px; height: 75vh; background: #1a1a1a; border-radius: 20px; box-sizing: border-box; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; border: 1px solid #333; overflow: hidden; z-index: 10; }
    #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
    
    /* Messages */
    .msg { padding: 12px 18px; border-radius: 15px; max-width: 80%; font-size: 1.1rem; line-height: 1.4; animation: popIn 0.3s ease; word-wrap: break-word; }
    @keyframes popIn { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
    .user-msg { background: #00FF41; color: #000; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: bold; }
    .ai-msg { background: #333; color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #444; }
    .ai-msg.masti { background: #FF00FF; color: #fff; border: none; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
    .ai-msg.error { background: #ff3333; color: #fff; border: none; }
    
    .typing-indicator { display: none; align-self: flex-start; padding: 12px 18px; background: #333; border-radius: 15px; color: #aaa; font-style: italic; margin-left: 20px; margin-bottom: 10px;}

    /* Text Input Area */
    #input-area { display: flex; padding: 15px; background: #222; border-top: 1px solid #333; gap: 10px; align-items: center; }
    #user-input { flex: 1; padding: 15px; border-radius: 25px; border: 1px solid #444; background: #111; color: #fff; font-size: 1rem; font-family: 'Inter', sans-serif; outline: none; transition: 0.2s; }
    #user-input:focus { border-color: #00FF41; box-shadow: 0 0 10px rgba(0,255,65,0.2); }
    #send-btn { background: #00FF41; color: #000; font-weight: bold; border: none; padding: 0 20px; height: 50px; border-radius: 25px; cursor: pointer; font-size: 1rem; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,255,65,0.2); }
    #send-btn:active { transform: scale(0.95); }

    /* Floating Menu Options */
    .fab-menu { position: absolute; bottom: 130px; right: 20px; display: none; flex-direction: column; gap: 10px; align-items: flex-end; z-index: 90; }
    .fab-menu.active { display: flex; animation: slideUp 0.3s ease; }
    @keyframes slideUp { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
    
    .menu-btn { background: #222; color: #fff; padding: 12px 20px; border-radius: 30px; border: 1px solid #00FF41; font-weight: bold; font-size: 1rem; cursor: pointer; box-shadow: 0 5px 15px rgba(0,255,65,0.2); transition: 0.2s; white-space: nowrap; }
    .menu-btn:hover { background: #00FF41; color: #000; }
    .menu-btn.masti-btn { border-color: #FF00FF; box-shadow: 0 5px 15px rgba(255,0,255,0.2); }
    .menu-btn.masti-btn:hover { background: #FF00FF; color: #fff; }

    /* PURE CSS EILIK ROBOT */
    #robot-container { position: absolute; right: -100px; bottom: 110px; width: 80px; height: 100px; transition: right 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; z-index: 100; }
    #robot-container.slide-in { right: 20px; }

    .head { width: 60px; height: 50px; background: #fff; border-radius: 15px; position: absolute; top: 0; left: 10px; z-index: 3; display: flex; justify-content: center; align-items: center; box-shadow: 0 5px 10px rgba(0,0,0,0.5); }
    .screen { width: 50px; height: 40px; background: #111; border-radius: 10px; position: relative; border: 1px solid #333; }
    
    .eye { width: 8px; height: 8px; background: #00FF41; box-shadow: 0 0 8px #00FF41; position: absolute; top: 12px; transition: all 0.2s; }
    .eye.left { left: 10px; }
    .eye.right { right: 10px; }
    .mouth { width: 12px; height: 6px; border-bottom: 2px solid #00FF41; border-radius: 50%; position: absolute; bottom: 10px; left: 19px; transition: all 0.2s; box-shadow: 0 5px 5px rgba(0,255,65,0.2); }

    .body { width: 44px; height: 40px; background: #2a2b2e; border-radius: 10px 10px 5px 5px; position: absolute; top: 45px; left: 18px; z-index: 2; border-bottom: 3px solid #00FF41; box-shadow: 0 10px 15px rgba(0,255,65,0.3); transition: all 0.3s; }

    .arm { width: 14px; height: 35px; background: #fff; border-radius: 10px; position: absolute; top: 45px; z-index: 1; transform-origin: top center; transition: transform 0.3s; }
    .arm.left { left: 5px; transform: rotate(20deg); }
    .arm.right { right: 5px; transform: rotate(-20deg); }
    .hand { width: 10px; height: 10px; background: #111; border-radius: 50%; position: absolute; bottom: -3px; left: 2px; }

    .heart { position: absolute; left: 25px; top: -10px; font-size: 1.5rem; color: #FF00FF; opacity: 0; pointer-events: none; z-index: 5; }

    /* ANIMATION STATES */
    .waving .arm.left { animation: waveArm 0.4s alternate 3; }
    @keyframes waveArm { 0% { transform: rotate(20deg); } 100% { transform: rotate(110deg); } }
    
    .kissing .mouth { width: 6px; height: 6px; border: 2px solid #00FF41; left: 22px; }
    .kissing .heart { animation: floatHeart 1s ease-out forwards; }
    @keyframes floatHeart { 0% { opacity: 1; transform: translate(0, 0) scale(1); } 100% { opacity: 0; transform: translate(-30px, -40px) scale(1.5); } }
    
    .winking .eye.left { transform: scaleY(0.1); }
    
    .sad .mouth { border-bottom: none; border-top: 2px solid #00FF41; transform: translateY(4px); box-shadow: none; }
    .sad .eye { transform: translateY(2px); height: 6px; box-shadow: 0 0 2px #00FF41; }
    .sad .body { border-bottom-color: #555; box-shadow: none; }
    .sad .arm.left { transform: rotate(10deg); }
    .sad .arm.right { transform: rotate(-10deg); }

    /* Hidden Utilities */
    #image-upload { display: none; }
  </style>
</head>
<body>

  <div id="chat-container">
    <div id="chat-box">
      <div class="msg ai-msg">System ready. Type below, or tap my white arms to wake me up! 👀</div>
    </div>
    <div class="typing-indicator" id="typing">AI is thinking...</div>
    
    <div id="input-area">
      <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off">
      <button id="send-btn" onclick="sendText()">Send</button>
    </div>
  </div>

  <input type="file" id="image-upload" accept="image/*" onchange="handleVisionUpload(event)">

  <div class="fab-menu" id="fab-menu">
    <button class="menu-btn" onclick="executeCommand('vision')">📷 Analyze Screen</button>
    <button class="menu-btn" onclick="executeCommand('standard')">🎤 Live Talk (English)</button>
    <button class="menu-btn masti-btn" onclick="executeCommand('masti')">🤪 Masti Time (Hyderabadi)</button>
  </div>

  <div id="robot-container" onclick="triggerWakeUp()">
    <div class="head">
      <div class="screen">
        <div class="eye left"></div>
        <div class="eye right"></div>
        <div class="mouth"></div>
      </div>
    </div>
    <div class="body"></div>
    <div class="arm left"><div class="hand"></div></div>
    <div class="arm right"><div class="hand"></div></div>
    <div class="heart">💖</div>
  </div>

  <script>
    // 1. SETUP & SECURITY
    const chatBox = document.getElementById('chat-box');
    const typingIndicator = document.getElementById('typing');
    const robot = document.getElementById('robot-container');
    const menu = document.getElementById('fab-menu');
    const userInput = document.getElementById('user-input');

    let GEMINI_API_KEY = localStorage.getItem('gemini_api_key');
    if (!GEMINI_API_KEY) {
        setTimeout(() => {
            GEMINI_API_KEY = prompt("Welcome! Please paste your Gemini API Key to activate the AI brain:");
            if (GEMINI_API_KEY) {
                localStorage.setItem('gemini_api_key', GEMINI_API_KEY);
                addMessage("API Key saved securely! Ready to rock.", 'ai');
            } else {
                addMessage("ERROR: No API key provided. Reload page to try again.", 'ai', false, true);
            }
        }, 1000);
    }

    // 2. TEXT CHAT LOGIC
    async function sendText() {
        const text = userInput.value.trim();
        if (!text) return; 

        userInput.value = ''; 
        addMessage(text, 'user');

        robot.classList.add('slide-in'); 

        let reply = await askGemini(text, "You are a helpful AI assistant. Keep responses under 2 sentences.");
        addMessage(reply, 'ai');
        speakText(reply, 'en-US');

        setTimeout(() => {
            if(robotState === 'spy') robot.classList.remove('slide-in');
        }, 3000);
    }

    userInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') sendText();
    });

    // 3. ROBOT STATE MACHINE
    let robotState = 'spy';
    let menuTimeout;

    function triggerWakeUp() {
        if (robotState !== 'spy') return; 
        robotState = 'animating';
        
        robot.classList.add('slide-in', 'waving');
        
        setTimeout(() => {
            robot.classList.remove('waving');
            robot.classList.add('kissing');
            
            setTimeout(() => {
                robot.classList.remove('kissing');
                robot.classList.add('winking');
                
                setTimeout(() => {
                    robot.classList.remove('winking');
                    robotState = 'active';
                    menu.classList.add('active');
                    startCountdown();
                }, 500);
            }, 1000);
        }, 1200);
    }

    function startCountdown() {
        clearTimeout(menuTimeout);
        menuTimeout = setTimeout(() => {
            menu.classList.remove('active');
            robot.classList.add('sad');
            
            setTimeout(() => {
                robot.classList.remove('slide-in', 'sad');
                robotState = 'spy';
            }, 1500); 
        }, 3000);
    }

    function executeCommand(mode) {
        clearTimeout(menuTimeout);
        menu.classList.remove('active');
        robot.classList.remove('slide-in');
        robotState = 'spy';

        if (mode === 'vision') {
            document.getElementById('image-upload').click();
        } else {
            startLiveTalk(mode);
        }
    }

    // 4. CORE AI LOGIC
    function addMessage(text, sender, isMasti = false, isError = false) {
        let div = document.createElement('div');
        div.className = `msg ${sender}-msg ${isMasti ? 'masti' : ''} ${isError ? 'error' : ''}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function speakText(text, language = 'en-US') {
        const synth = window.speechSynthesis;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = language;
        utterance.rate = 1.05;
        let voices = synth.getVoices();
        if (language === 'hi-IN') {
            let indianVoice = voices.find(v => v.lang === 'hi-IN' || v.lang.includes('hi'));
            if (indianVoice) utterance.voice = indianVoice;
        }
        synth.speak(utterance);
    }

    async function askGemini(promptText, systemInstruction = null, base64Image = null, mimeType = null) {
        typingIndicator.style.display = 'block';
        try {
            let contents = [{ role: "user", parts: [{ text: promptText }] }];
            if (base64Image) {
                contents[0].parts.unshift({ inlineData: { mimeType: mimeType, data: base64Image } });
            }
            let payload = { contents: contents };
            if (systemInstruction) {
                payload.systemInstruction = { parts: [{ text: systemInstruction }] };
            }
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload)
            });
            const data = await response.json();
            typingIndicator.style.display = 'none';
            if(data.error) throw new Error(data.error.message);
            return data.candidates[0].content.parts[0].text;
        } catch (error) {
            typingIndicator.style.display = 'none';
            console.error(error);
            return "Connection error. Please check API Key.";
        }
    }

    // 5. VOICE ENGINE & MIC ERROR CATCHER
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.continuous = false;
    let currentMode = 'standard';

    // Catch Mic Errors Here!
    recognition.onerror = function(event) {
        addMessage("Mic Error: " + event.error + ". Are you in Incognito? Make sure mic is allowed!", 'ai', false, true);
    };

    function startLiveTalk(mode) {
        currentMode = mode;
        recognition.lang = (mode === 'masti') ? 'hi-IN' : 'en-US';
        addMessage("Listening... 🎤", 'ai');
        recognition.start();
    }

    recognition.onresult = async (event) => {
        const spokenText = event.results[0][0].transcript;
        addMessage(spokenText, 'user');
        let reply = "";
        if (currentMode === 'masti') {
            let sysPrompt = "You are a chill, funny friend from Hyderabad, India. Speak entirely in heavy Hyderabadi slang (using words like baigan, ustad, yaaro, hao, nakko, kirak). Keep it brief and funny. Use Roman Urdu/Hindi text.";
            reply = await askGemini(spokenText, sysPrompt);
            addMessage(reply, 'ai', true);
            speakText(reply, 'hi-IN'); 
        } else {
            reply = await askGemini(spokenText, "You are a helpful AI assistant. Keep responses under 2 sentences.");
            addMessage(reply, 'ai');
            speakText(reply, 'en-US');
        }
    };

    // 6. VISION ENGINE
    async function handleVisionUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        addMessage(`Analyzing image: ${file.name} 📷`, 'user');
        const reader = new FileReader();
        reader.onloadend = async () => {
            const base64String = reader.result.split(',')[1];
            let reply = await askGemini("Explain what is happening in this image briefly.", null, base64String, file.type);
            addMessage(reply, 'ai');
            speakText(reply, 'en-US');
        };
        reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
