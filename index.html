<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#17110d">
  <title>Pocket AI — Street Edition (3D)</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="chat-container">
    <div id="chat-header">
      <span class="dot"></span> Pocket AI <span class="mode-label" id="mode-label">Street Mode</span>
    </div>
    <div id="chat-box">
      <div class="msg ai-msg">Arre suno! Tap the character in the corner to wake it up. Pick your vibe, then hit a mood button below. 👀</div>
    </div>
    <div class="typing-indicator" id="typing">thinking<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>

    <div id="input-area">
      <input type="text" id="user-input" placeholder="Type kuch bhi... (EN / HI / UR)" autocomplete="off">
      <button id="send-btn" onclick="sendText()">➤</button>
    </div>
  </div>

  <input type="file" id="image-upload" accept="image/*" onchange="handleVisionUpload(event)">

  <!-- MOOD MENU -->
  <div class="fab-menu" id="fab-menu">
    <button class="menu-btn" onclick="executeCommand('vision')">📷 Analyze Screen</button>
    <button class="menu-btn street-btn" onclick="executeCommand('street-en')">🔥 Street Talk (EN)</button>
    <button class="menu-btn street-btn" onclick="executeCommand('street-hi')">🔥 Street Talk (HI/UR)</button>
    <button class="menu-btn masti-btn" onclick="executeCommand('masti')">🤪 Masti Time (Hyd)</button>
  </div>

  <!-- AVATAR DOCK -->
  <div id="avatar-dock">
    <div class="avatar-picker">
      <button class="picker-btn active" data-avatar="robot" onclick="setAvatar('robot')">🤖</button>
      <button class="picker-btn" data-avatar="girl" onclick="setAvatar('girl')">👧</button>
      <button class="picker-btn" data-avatar="boy" onclick="setAvatar('boy')">🧑</button>
    </div>

    <!-- The 3D Character Stage -->
    <div id="avatar-stage" onclick="triggerGesture()">
      <canvas id="avatar-canvas"></canvas>
      <div class="peek-hands">
        <div class="peek left"></div>
        <div class="peek right"></div>
      </div>
      <div id="heart-container"></div>
    </div>
  </div>

  <!-- Three.js r128 — matches this environment's cached version -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="avatar3d.js"></script>
  <script src="script.js"></script>
</body>
</html>
