<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- PWA Meta Tags to make it look like a real app on phones -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#121212">
  <title>Pocket AI Assistant</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    body { margin: 0; font-family: 'Inter', sans-serif; background: #121212; color: #fff; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    
    /* Core UI */
    #chat-box { width: 90%; max-width: 500px; height: 60vh; background: #1e1e1e; border-radius: 20px; padding: 20px; box-sizing: border-box; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; gap: 15px; border: 1px solid #333; }
    .msg { padding: 12px 18px; border-radius: 15px; max-width: 80%; font-size: 1.1rem; line-height: 1.4; animation: popIn 0.3s ease; }
    @keyframes popIn { 0% { opacity: 0; transform: translateY(10px) scale(0.95); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
    .user-msg { background: #00FF41; color: #000; align-self: flex-end; border-bottom-right-radius: 2px; font-weight: bold; }
    .ai-msg { background: #333; color: #fff; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #444; }
    .ai-msg.masti { background: #FF00FF; color: #fff; border: none; text-shadow: 0 0 5px rgba(255,255,255,0.5); }
    
    /* The Floating Anime/Emoji Button */
    #fab-container { position: absolute; bottom: 30px; right: 30px; z-index: 100; display: flex; flex-direction: column; align-items: flex-end; gap: 15px; }
    .fab-menu { display: none; flex-direction: column; gap: 10px; align-items: flex-end; }
    .fab-menu.active { display: flex; animation: slideUp 0.3s ease; }
    @keyframes slideUp { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
    
    .menu-btn { background: #222; color: #fff; padding: 12px 20px; border-radius: 30px; border: 1px solid #00FF41; font-weight: bold; font-size: 1rem; cursor: pointer; display: flex; align-items: center; gap: 10px; box-shadow: 0 5px 15px rgba(0,255,65,0.2); transition: 0.2s; white-space: nowrap; }
    .menu-btn:hover { background: #00FF41; color: #000; }
    .menu-btn.masti-btn { border-color: #FF00FF; box-shadow: 0 5px 15px rgba(255,0,255,0.2); }
    .menu-btn.masti-btn:hover { background: #FF00FF; color: #fff; }
    
    #main-fab { width: 70px; height: 70px; background: #00FF41; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; cursor: pointer; box-shadow: 0 10px 25px rgba(0,255,65,0.4); border: none; outline: none; transition: transform 0.2s; }
    #main-fab:active { transform: scale(0.9); }
    
    /* Loading Indicator */
    .typing-indicator { display: none; align-self: flex-start; padding: 12px 18px; background: #333; border-radius: 15px; color: #aaa; font-style: italic; }
    
    /* Hidden inputs */
    #image-upload { display: none; }
  </style>
</head>
<body>

  <div id="chat-box">
    <div class="msg ai-msg">System initialized. Tap the robot icon to start.</div>
  </div>
  <div class="typing-indicator" id="typing">AI is thinking...</div>

  <!-- Hidden File Input for Vision AI -->
  <input type="file" id="image-upload" accept="image/*" onchange="handleImageUpload(event)">

  <!-- The Floating Action Button (FAB) Area -->
  <div id="fab-container">
    <div class="fab-menu" id="fab-menu">
      <button class="menu-btn" onclick="triggerVisionMode()">📷 Analyze Screen (Upload)</button>
      <button class="menu-btn" onclick="startLiveTalk('standard')">🎤 Live Talk (English)</button>
      <button class="menu-btn masti-btn" onclick="startLiveTalk('masti')">🤪 Masti Time (Hyderabadi)</button>
    </div>
    <button id="main-fab" onclick="toggleMenu()">🤖</button>
  </div>

  <script>
    // ================= SECURITY & SETUP =================
    let GEMINI_API_KEY = localStorage.getItem('gemini_api_key');
    
    // If no key is found, ask for it securely and save it
    if (!GEMINI_API_KEY) {
        GEMINI_API_KEY = prompt("Welcome! Please paste your Gemini API Key to activate the AI brain:");
        if (GEMINI_API_KEY) {
            localStorage.setItem('gemini_api_key', GEMINI_API_KEY);
            addMessage("API Key saved securely to your device.", 'ai');
        } else {
            addMessage("ERROR: No API key provided. Reload page to try again.", 'ai');
        }
    }

    const chatBox = document.getElementById('chat-box');
    const typingIndicator = document.getElementById('typing');
    let isMenuOpen = false;

    // Speech Recognition Setup
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = false;
    let currentMode = 'standard'; 

    function toggleMenu() {
        isMenuOpen = !isMenuOpen;
        document.getElementById('fab-menu').classList.toggle('active');
        document.getElementById('main-fab').style.transform = isMenuOpen ? "rotate(45deg)" : "rotate(0deg)";
    }

    function addMessage(text, sender, isMasti = false) {
        let div = document.createElement('div');
        div.className = `msg ${sender}-msg ${isMasti ? 'masti' : ''}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // --- TEXT-TO-SPEECH ENGINE ---
    function speakText(text, language = 'en-US') {
        const synth = window.speechSynthesis;
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = language;
        utterance.rate = 1.05;
        
        let voices = synth.getVoices();
        if (language === 'hi-IN') {
            let indianVoice = voices.find(v => v.lang === 'hi-IN' || v.lang.includes('hi'));
            if (indianVoice) utterance.voice = indianVoice;
        }
        synth.speak(utterance);
    }

    // ================= GEMINI API FETCH LOGIC =================
    // This is the brain! It calls the Google endpoint securely from the browser.
    async function askGemini(promptText, systemInstruction = null, base64Image = null, mimeType = null) {
        typingIndicator.style.display = 'block';
        
        try {
            let contents = [{ role: "user", parts: [{ text: promptText }] }];

            // If an image was uploaded, attach it to the request payload
            if (base64Image) {
                contents[0].parts.unshift({
                    inlineData: { mimeType: mimeType, data: base64Image }
                });
            }

            let payload = { contents: contents };

            // If we are in Masti mode, inject the personality instructions!
            if (systemInstruction) {
                payload.systemInstruction = { parts: [{ text: systemInstruction }] };
            }

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            typingIndicator.style.display = 'none';
            
            if(data.error) throw new Error(data.error.message);
            
            return data.candidates[0].content.parts[0].text;
            
        } catch (error) {
            typingIndicator.style.display = 'none';
            console.error("Gemini Error:", error);
            return "Sorry, I hit a snag connecting to the brain. Check console for details.";
        }
    }

    // ================= MODE 1: LIVE TALK & MASTI TIME =================
    function startLiveTalk(mode) {
        currentMode = mode;
        toggleMenu();
        
        // Set listening language based on mode
        recognition.lang = (mode === 'masti') ? 'hi-IN' : 'en-US';
        
        addMessage("Listening... 🎤", 'ai');
        recognition.start();
    }

    recognition.onresult = async (event) => {
        const spokenText = event.results[0][0].transcript;
        addMessage(spokenText, 'user');
        
        let reply = "";
        
        if (currentMode === 'masti') {
            // The Secret System Prompt for Hyderabadi slang!
            let systemPrompt = "You are a chill, funny friend from Hyderabad, India. Speak entirely in heavy Hyderabadi slang (using words like baigan, ustad, yaaro, hao, nakko, kirak). Keep it brief, conversational, and very funny. Reply using the Roman Hindi/Urdu alphabet, not standard English.";
            reply = await askGemini(spokenText, systemPrompt);
            addMessage(reply, 'ai', true);
            speakText(reply, 'hi-IN'); 
        } else {
            // Standard English Assistant
            reply = await askGemini(spokenText, "You are a helpful, concise AI assistant. Keep responses under 3 sentences.");
            addMessage(reply, 'ai');
            speakText(reply, 'en-US');
        }
    };

    // ================= MODE 2: ANALYZE SCREEN (VISION) =================
    function triggerVisionMode() {
        toggleMenu();
        // Clicks the hidden file input to open the phone's camera roll/file picker
        document.getElementById('image-upload').click();
    }

    async function handleImageUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        addMessage(`Analyzing image: ${file.name} 📷`, 'user');

        // Convert the image to Base64 so Gemini can read it
        const reader = new FileReader();
        reader.onloadend = async () => {
            const base64String = reader.result.split(',')[1];
            
            let prompt = "Explain what is happening in this image. Keep it brief and conversational.";
            let reply = await askGemini(prompt, null, base64String, file.type);
            
            addMessage(reply, 'ai');
            speakText(reply, 'en-US');
        };
        reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
